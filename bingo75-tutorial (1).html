<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo 75 – Tutorial</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d4960a;
    --gold-dark: #a87200;
    --red: #e03e3e;
    --green: #2ecc71;
    --bg: #f0f2f8;
    --card-bg: #ffffff;
    --card-border: #c8cde0;
    --hero-accent: #1a7fc4;
    --villain-accent: #b03050;
    --gray-row: #eaedf5;
    --text: #1e2240;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Barlow Condensed', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(26,127,196,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 10% 90%, rgba(212,150,10,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    letter-spacing: 0.12em;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(245,200,66,0.4);
    margin: 28px 0 4px;
  }

  .subtitle {
    font-size: 1rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(30,34,64,0.4);
    margin-bottom: 28px;
  }

  /* ── BALL STAGE ── */
  .ball-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
  }

  .ball-label {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(30,34,64,0.4);
  }

  .ball-wrapper {
    width: 90px;
    height: 90px;
    position: relative;
  }

  .ball {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff9d6, var(--gold) 55%, var(--gold-dark));
    box-shadow: 0 0 0 3px var(--gold-dark), 0 0 25px rgba(245,200,66,0.5), inset 0 -4px 12px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    color: #1a1200;
    transition: transform 0.15s;
    transform: scale(0);
    opacity: 0;
  }

  .ball.show {
    animation: ballPop 0.45s cubic-bezier(.17,.89,.32,1.4) forwards;
  }

  .ball.idle {
    transform: scale(1);
    opacity: 1;
  }

  @keyframes ballPop {
    0%   { transform: scale(0) rotate(-20deg); opacity: 0; }
    70%  { transform: scale(1.15) rotate(5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* ── PROGRESS ROW ── */
  .progress-row {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 720px;
    padding: 0 16px;
  }

  .prog-ball {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(30,34,64,0.06);
    border: 1.5px solid rgba(30,34,64,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: rgba(30,34,64,0.35);
    transition: all 0.3s;
  }

  .prog-ball.drawn {
    background: var(--gold);
    border-color: var(--gold-dark);
    color: #1a1200;
    box-shadow: 0 0 8px rgba(245,200,66,0.4);
  }

  /* ── CARDS AREA ── */
  .cards-area {
    display: flex;
    gap: clamp(12px, 2vw, 24px);
    justify-content: center;
    flex-wrap: wrap;
    padding: 0 16px;
    margin-bottom: 32px;
  }

  /* ── SINGLE CARD ── */
  .card-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .player-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.15em;
  }
  .player-label.hero  { color: var(--hero-accent); text-shadow: 0 0 12px rgba(79,195,247,0.5); }
  .player-label.villain { color: var(--villain-accent); }

  .bingo-card {
    background: var(--card-bg);
    border: 1.5px solid var(--card-border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(30,34,64,0.10);
    transition: box-shadow 0.3s;
    width: clamp(190px, 28vw, 230px);
  }

  .bingo-card.hero-card {
    border-color: rgba(26,127,196,0.5);
    box-shadow: 0 2px 12px rgba(26,127,196,0.12);
  }

  .bingo-card.winner {
    animation: winPulse 0.6s ease-in-out infinite alternate;
    border-color: var(--gold) !important;
  }

  @keyframes winPulse {
    from { box-shadow: 0 0 20px rgba(245,200,66,0.4); }
    to   { box-shadow: 0 0 50px rgba(245,200,66,0.9); }
  }

  /* BINGO header */
  .bingo-header {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    background: linear-gradient(135deg, #d8ddf0, #e8ebf7);
    border-bottom: 1px solid var(--card-border);
  }

  .bingo-header span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.1em;
    text-align: center;
    padding: 6px 0;
  }

  .bingo-header span:nth-child(1) { color: #c0392b; }
  .bingo-header span:nth-child(2) { color: #b07d00; }
  .bingo-header span:nth-child(3) { color: #27ae60; }
  .bingo-header span:nth-child(4) { color: #1a7fc4; }
  .bingo-header span:nth-child(5) { color: #8e44ad; }

  /* Grid rows */
  .card-grid {
    display: flex;
    flex-direction: column;
  }

  .card-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
  }

  .card-row.active-row {
    border-bottom: 1px solid var(--card-border);
  }

  .card-row.active-row:last-child {
    border-bottom: none;
  }

  .card-row.gray-row {
    opacity: 0.3;
    background: var(--gray-row);
  }

  .card-row.middle-row {
    opacity: 0.55;
    background: var(--gray-row);
    border-top: 1px dashed rgba(255,255,255,0.08);
    border-bottom: 1px dashed rgba(255,255,255,0.08);
  }

  .card-row.gray-row + .active-row {
    border-top: 1px solid var(--card-border);
  }

  .cell.free {
    color: rgba(245,200,66,0.45);
    font-size: 0.65rem;
    letter-spacing: 0.05em;
  }

  .cell.marked-mid {
    background: rgba(212,150,10,0.15);
    color: #a07000;
    animation: midFlash 0.5s ease forwards;
  }

  @keyframes midFlash {
    0%   { background: rgba(245,200,66,0.45); }
    100% { background: rgba(245,200,66,0.15); }
  }

  /* Cells */
  .cell {
    text-align: center;
    padding: 9px 2px;
    font-size: clamp(0.85rem, 1.6vw, 1rem);
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #2a2f5a;
    border-right: 1px solid rgba(30,34,64,0.07);
    transition: background 0.3s, color 0.3s;
    position: relative;
  }

  .cell:last-child { border-right: none; }

  .gray-row .cell,
  .middle-row .cell {
    font-size: 0.78rem;
    font-weight: 400;
    color: #9098c0;
  }

  .cell.marked {
    background: rgba(26,127,196,0.15);
    color: var(--hero-accent);
  }

  .cell.marked-villain {
    background: rgba(176,48,80,0.12);
    color: #b03050;
  }

  .cell.just-marked {
    animation: cellFlash 0.5s ease forwards;
  }

  @keyframes cellFlash {
    0%   { background: rgba(245,200,66,0.7); color: #1a1200; transform: scale(1.12); }
    100% { }
  }

  /* line complete overlay */
  .cell.line-done {
    background: linear-gradient(135deg, rgba(46,204,113,0.3), rgba(79,195,247,0.2));
    color: #a5f3c0;
  }

  /* ── LINE PROGRESS INDICATORS ── */
  .line-indicators {
    display: flex;
    gap: 6px;
    margin-top: 2px;
  }

  .line-ind {
    flex: 1;
    height: 4px;
    background: rgba(30,34,64,0.10);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }

  .line-ind-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--hero-accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
  }

  .villain-card .line-ind-fill {
    background: var(--villain-accent);
  }

  /* ── CONTROL SECTION ── */
  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }

  .draw-info {
    font-size: 0.8rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(30,34,64,0.4);
  }

  .btn {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 0.15em;
    padding: 12px 44px;
    border: 2px solid var(--gold);
    background: transparent;
    color: var(--gold-dark);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn:hover {
    background: var(--gold);
    color: #1a1200;
    box-shadow: 0 0 20px rgba(245,200,66,0.4);
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: default;
    pointer-events: none;
  }

  .btn.reset-btn {
    font-size: 1rem;
    border-color: rgba(221,227,245,0.2);
    color: rgba(30,34,64,0.4);
    padding: 7px 24px;
  }

  .btn.reset-btn:hover {
    background: rgba(221,227,245,0.1);
    color: var(--text);
    box-shadow: none;
  }

  /* ── WIN BANNER ── */
  .win-banner {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 32px 24px 40px;
    margin: 8px 16px 32px;
    background: linear-gradient(135deg, #fffbe8, #fff8d6);
    border: 2px solid var(--gold);
    border-radius: 16px;
    box-shadow: 0 4px 24px rgba(212,150,10,0.15);
  }

  .win-banner.active {
    display: flex;
    animation: winSlideIn 0.5s cubic-bezier(.17,.89,.32,1.4) forwards;
  }

  @keyframes winSlideIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  .win-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 6rem);
    letter-spacing: 0.15em;
    color: var(--gold-dark);
    text-shadow: 0 2px 12px rgba(212,150,10,0.3);
  }

  .win-sub {
    font-size: clamp(0.9rem, 2.5vw, 1.3rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(30,34,64,0.6);
    margin-top: 6px;
  }

  .win-close {
    margin-top: 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    padding: 10px 36px;
    border: 2px solid var(--gold-dark);
    background: transparent;
    color: var(--gold-dark);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .win-close:hover { background: var(--gold-dark); color: #fff; }

  @keyframes zoomIn {
    from { transform: scale(0.3); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* ── COUNTERS ── */
  .counters {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .counter-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 20px;
    background: white;
    border: 1.5px solid var(--card-border);
    border-radius: 10px;
    min-width: 90px;
    box-shadow: 0 2px 8px rgba(30,34,64,0.07);
  }

  .counter-box.hero-counter {
    border-color: rgba(26,127,196,0.5);
    background: #f0f7ff;
  }

  .counter-label {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(30,34,64,0.4);
  }

  .counter-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    line-height: 1;
    color: var(--text);
    transition: all 0.3s;
  }

  .counter-num.urgent {
    color: #c0392b;
    animation: counterPulse 0.4s ease;
  }

  @keyframes counterPulse {
    0%   { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  .counter-suffix {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: rgba(30,34,64,0.3);
    text-transform: uppercase;
  }

  /* ── AUTODAUB ── */
  .btn.autodaub-btn {
    border-color: #27ae60;
    color: #27ae60;
    font-size: 1rem;
    padding: 9px 28px;
  }

  .btn.autodaub-btn:hover {
    background: #27ae60;
    color: white;
    box-shadow: 0 0 16px rgba(39,174,96,0.3);
  }

  .btn.autodaub-btn.active {
    background: #27ae60;
    color: white;
    box-shadow: 0 0 16px rgba(39,174,96,0.3);
  }

  /* confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -20px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ── DRAW HISTORY ── */
  .history-label {
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(30,34,64,0.3);
    margin-bottom: 6px;
    text-align: center;
  }

</style>
</head>
<body>

<h1>Bingo 75</h1>
<p class="subtitle">Tutorial — wygraj swoją pierwszą grę</p>

<!-- BALL STAGE -->
<div class="ball-stage">
  <span class="ball-label">Wylosowana liczba</span>
  <div class="ball-wrapper">
    <div class="ball" id="mainBall">–</div>
  </div>
</div>

<!-- PROGRESS BALLS (drawn numbers) -->
<div class="progress-row" id="progressRow"></div>

<!-- CARDS AREA -->
<div class="cards-area" id="cardsArea"></div>

<!-- COUNTERS -->
<div class="counters" id="counters">
  <div class="counter-box hero-counter">
    <div class="counter-label">Gracz 1 (Ty)</div>
    <div class="counter-num" id="cnt-hero">10</div>
    <div class="counter-suffix">do wygranej</div>
  </div>
  <div class="counter-box">
    <div class="counter-label">Gracz 2</div>
    <div class="counter-num" id="cnt-villain1">10</div>
    <div class="counter-suffix">do wygranej</div>
  </div>
  <div class="counter-box">
    <div class="counter-label">Gracz 3</div>
    <div class="counter-num" id="cnt-villain2">10</div>
    <div class="counter-suffix">do wygranej</div>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="draw-info" id="drawInfo">Naciśnij przycisk, aby wylosować pierwszą liczbę</div>
  <button class="btn" id="drawBtn" onclick="drawNext()">Losuj</button>
  <div style="display:flex;gap:10px;align-items:center;">
    <button class="btn autodaub-btn" id="autodaubBtn" onclick="toggleAutodaub()">⏱ Autodaub</button>
    <button class="btn reset-btn" onclick="resetGame()">↺ Reset</button>
  </div>
</div>

<!-- WIN SCREEN (inline, below cards) -->
<div class="win-banner" id="winBanner">
  <div class="win-title">🎉 BINGO!</div>
  <div class="win-sub">Gracz 1 (Ty) wygrał!</div>
  <button class="win-close" onclick="resetGame()">↺ Zagraj ponownie</button>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

const PLAYERS = [
  {
    id: 'hero',
    name: 'Gracz 1 (Ty)',
    type: 'hero',
    rows: {
      top:    [7,  19, 35, 52, 63],
      gray1:  [2,  20, 37, 48, 64],
      gray2:  [13, 26, 'FREE', 46, 66],
      gray3:  [15, 27, 31,     60, 69],
      bottom: [11, 22, 44,     58, 71],
    }
  },
  {
    id: 'villain1',
    name: 'Gracz 2',
    type: 'villain',
    rows: {
      top:    [3,  19, 38,     50, 63],
      gray1:  [8,  25, 31,     55, 62],
      gray2:  [12, 29, 'FREE', 60, 67],
      gray3:  [6,  20, 34,     46, 73],
      bottom: [14, 28, 44,     59, 71],
    }
  },
  {
    id: 'villain2',
    name: 'Gracz 3',
    type: 'villain',
    rows: {
      top:    [9,  24, 35,     47, 63],
      gray1:  [4,  17, 36,     46, 61],
      gray2:  [14, 16, 'FREE', 54, 68],
      gray3:  [15, 20, 31,     60, 74],
      bottom: [5,  22, 44,     59, 71],
    }
  }
];

// 17 kul: 13 kuponowych + 4 środkowe (20,31,46,60) wtrącone między właściwe
// każda środkowa kula zaznacza 3 pola jednocześnie (wszystkie karty) = 12 pól łącznie
const SEQUENCE = [7, 20, 19, 3, 35, 31, 22, 52, 9, 46, 63, 38, 60, 58, 59, 44, 71, 11];

// State
let drawIndex = 0;
let markedCells = {};  // key: "playerId-rowKey-colIdx" => true
let animating = false;
let autodaubTimer = null;

function toggleAutodaub() {
  const btn = document.getElementById('autodaubBtn');
  if (autodaubTimer) {
    clearInterval(autodaubTimer);
    autodaubTimer = null;
    btn.classList.remove('active');
    btn.textContent = '⏱ Autodaub';
  } else {
    btn.classList.add('active');
    btn.textContent = '⏹ Stop';
    autodaubTimer = setInterval(() => {
      if (drawIndex >= SEQUENCE.length || gameWon) {
        clearInterval(autodaubTimer);
        autodaubTimer = null;
        const b = document.getElementById('autodaubBtn');
        b.classList.remove('active');
        b.textContent = '⏱ Autodaub';
        return;
      }
      drawNext();
    }, 1400);
  }
}

function updateCounters() {
  PLAYERS.forEach(player => {
    const totalMarked = ['top','bottom'].reduce((sum, rk) => {
      return sum + player.rows[rk].filter((n, ci) => markedCells[`${player.id}-${rk}-${ci}`]).length;
    }, 0);
    const remaining = 10 - totalMarked;
    const el = document.getElementById(`cnt-${player.id}`);
    if (!el) return;
    el.textContent = remaining;
    el.classList.remove('urgent');
    if (remaining <= 3 && remaining > 0) {
      void el.offsetWidth;
      el.classList.add('urgent');
    }
    if (remaining === 0) {
      el.style.color = '#27ae60';
    }
  });
}

// ── BUILD PROGRESS ROW ────────────────────────────────────────────────────────
function buildProgress() {
  const row = document.getElementById('progressRow');
  row.innerHTML = '';
  SEQUENCE.forEach((n, i) => {
    const d = document.createElement('div');
    d.className = 'prog-ball';
    d.id = `prog-${i}`;
    d.textContent = n;
    row.appendChild(d);
  });
}

// ── BUILD CARDS ───────────────────────────────────────────────────────────────
function buildCards() {
  const area = document.getElementById('cardsArea');
  area.innerHTML = '';

  PLAYERS.forEach(player => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';

    // Label
    const label = document.createElement('div');
    label.className = `player-label ${player.type === 'hero' ? 'hero' : 'villain'}`;
    label.textContent = player.name;
    wrap.appendChild(label);

    // Card
    const card = document.createElement('div');
    card.className = `bingo-card ${player.type === 'hero' ? 'hero-card' : ''}`;
    card.id = `card-${player.id}`;

    // BINGO header
    const header = document.createElement('div');
    header.className = 'bingo-header';
    ['B','I','N','G','O'].forEach(l => {
      const s = document.createElement('span');
      s.textContent = l;
      header.appendChild(s);
    });
    card.appendChild(header);

    // Grid
    const grid = document.createElement('div');
    grid.className = 'card-grid';

    const rowOrder = ['top','gray1','gray2','gray3','bottom'];
    rowOrder.forEach((rowKey, ri) => {
      const isGray = rowKey.startsWith('gray');
      const isMiddle = rowKey === 'gray2';
      const rowEl = document.createElement('div');
      rowEl.className = isMiddle ? 'card-row middle-row' : (isGray ? 'card-row gray-row' : 'card-row active-row');
      rowEl.id = `row-${player.id}-${rowKey}`;

      player.rows[rowKey].forEach((num, ci) => {
        const cell = document.createElement('div');
        const isFree = num === 'FREE';
        cell.className = 'cell' + (isFree ? ' free' : '');
        cell.id = `cell-${player.id}-${rowKey}-${ci}`;
        cell.textContent = isFree ? '★' : (typeof num === 'number' ? num : '');
        rowEl.appendChild(cell);
      });
      grid.appendChild(rowEl);
    });
    card.appendChild(grid);
    wrap.appendChild(card);

    // Line progress indicators
    const inds = document.createElement('div');
    inds.className = `line-indicators ${player.type === 'villain' ? 'villain-card' : ''}`;
    [['top','GÓRA'],['bottom','DÓŁ']].forEach(([rk, lbl]) => {
      const wrap2 = document.createElement('div');
      wrap2.style.cssText = 'flex:1;display:flex;flex-direction:column;gap:2px;';
      const lbEl = document.createElement('div');
      lbEl.style.cssText = 'font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(221,227,245,0.25);text-align:center;';
      lbEl.textContent = lbl;
      const ind = document.createElement('div');
      ind.className = 'line-ind';
      const fill = document.createElement('div');
      fill.className = 'line-ind-fill';
      fill.id = `ind-${player.id}-${rk}`;
      ind.appendChild(fill);
      wrap2.appendChild(lbEl);
      wrap2.appendChild(ind);
      inds.appendChild(wrap2);
    });
    wrap.appendChild(inds);

    area.appendChild(wrap);
  });
}

// ── DRAW LOGIC ────────────────────────────────────────────────────────────────
function drawNext() {
  if (drawIndex >= SEQUENCE.length || animating) return;
  animating = true;

  const num = SEQUENCE[drawIndex];

  // Animate ball
  const ball = document.getElementById('mainBall');
  ball.className = 'ball';
  ball.textContent = num;
  void ball.offsetWidth;
  ball.className = 'ball show';
  setTimeout(() => { ball.classList.add('idle'); }, 450);

  // Light up progress ball
  document.getElementById(`prog-${drawIndex}`).classList.add('drawn');

  // Mark cells across all cards
  PLAYERS.forEach(player => {
    ['top','bottom','gray1','gray2','gray3'].forEach(rowKey => {
      player.rows[rowKey].forEach((n, ci) => {
        if (n === 'FREE') return;
        if (n === num) {
          const cell = document.getElementById(`cell-${player.id}-${rowKey}-${ci}`);
          const isActive = rowKey === 'top' || rowKey === 'bottom';
          const isHero = player.type === 'hero';
          if (isActive) {
            cell.classList.add(isHero ? 'marked' : 'marked-villain', 'just-marked');
            setTimeout(() => cell.classList.remove('just-marked'), 600);
            markedCells[`${player.id}-${rowKey}-${ci}`] = true;
            updateProgress(player, rowKey);
            setTimeout(() => checkLine(player, rowKey), 300);
          } else {
            // middle row — mark all three cards alike
            cell.classList.add('marked-mid');
          }
        }
      });
    });
  });

  // Update counters
  updateCounters();

  drawIndex++;

  // Update UI
  const remaining = SEQUENCE.length - drawIndex;
  const info = document.getElementById('drawInfo');
  if (drawIndex >= SEQUENCE.length) {
    info.textContent = 'Wszystkie liczby wylosowane';
    document.getElementById('drawBtn').disabled = true;
  } else {
    info.textContent = `Losowanie ${drawIndex} z ${SEQUENCE.length} — pozostało ${remaining}`;
  }

  setTimeout(() => { animating = false; }, 500);
}

function updateProgress(player, rowKey) {
  // Show combined coupon progress (both rows / 10)
  ['top','bottom'].forEach(rk => {
    const marked = player.rows[rk].filter((n, ci) =>
      markedCells[`${player.id}-${rk}-${ci}`]
    ).length;
    const pct = (marked / 5) * 100;
    const fill = document.getElementById(`ind-${player.id}-${rk}`);
    if (fill) fill.style.width = pct + '%';
  });
}

let gameWon = false;

function checkLine(player, rowKey) {
  if (gameWon) return;
  // Win condition: BOTH active rows complete (full coupon = 10 cells)
  const topDone = player.rows['top'].every((n, ci) => markedCells[`${player.id}-top-${ci}`]);
  const bottomDone = player.rows['bottom'].every((n, ci) => markedCells[`${player.id}-bottom-${ci}`]);
  if (topDone && bottomDone) {
    ['top','bottom'].forEach(rk => {
      player.rows[rk].forEach((n, ci) => {
        document.getElementById(`cell-${player.id}-${rk}-${ci}`).classList.add('line-done');
      });
    });
    if (player.type === 'hero') {
      gameWon = true;
      document.getElementById(`card-${player.id}`).classList.add('winner');
      setTimeout(showWin, 600);
    }
  }
}

// ── WIN ───────────────────────────────────────────────────────────────────────
function showWin() {
  if (autodaubTimer) {
    clearInterval(autodaubTimer);
    autodaubTimer = null;
    const ab = document.getElementById('autodaubBtn');
    if (ab) { ab.classList.remove('active'); ab.textContent = '⏱ Autodaub'; }
  }
  spawnConfetti();
  document.getElementById('winBanner').classList.add('active');
  document.getElementById('winBanner').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function spawnConfetti() {
  const colors = ['#f5c842','#4fc3f7','#2ecc71','#e03e3e','#ba68c8','#ff8a65'];
  for (let i = 0; i < 80; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.animationDuration = (1.5 + Math.random() * 2.5) + 's';
    piece.style.animationDelay = (Math.random() * 0.8) + 's';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}

// ── RESET ─────────────────────────────────────────────────────────────────────
function resetGame() {
  // Stop autodaub
  if (autodaubTimer) {
    clearInterval(autodaubTimer);
    autodaubTimer = null;
    const ab = document.getElementById('autodaubBtn');
    if (ab) { ab.classList.remove('active'); ab.textContent = '⏱ Autodaub'; }
  }

  drawIndex = 0;
  markedCells = {};
  animating = false;
  gameWon = false;

  const ball = document.getElementById('mainBall');
  ball.className = 'ball idle';
  ball.textContent = '–';

  document.getElementById('drawInfo').textContent = 'Naciśnij przycisk, aby wylosować pierwszą liczbę';
  document.getElementById('drawBtn').disabled = false;
  document.getElementById('winBanner').classList.remove('active');

  // Reset counters
  PLAYERS.forEach(p => {
    const el = document.getElementById(`cnt-${p.id}`);
    if (el) { el.textContent = '10'; el.style.color = ''; el.classList.remove('urgent'); }
  });

  buildProgress();
  buildCards();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildProgress();
buildCards();

// Set initial ball state
document.getElementById('mainBall').classList.add('idle');
</script>
